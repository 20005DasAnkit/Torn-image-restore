{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>

body{
    background:#020617;
    color:white;
    font-family:Arial;
}

/* TOP BAR */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.welcome-text{
    font-size:35px;
    margin:0;
}

.date-text{
    color:#9ca3af;
    margin-top:10px;
    font-size:13px;
}

.top-right{
    display:flex;
    align-items:center;
    gap:15px;
}



/* PROFILE IMAGE */

.profile-img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00c3ff;
}

.large{
    width:90px;
    height:90px;
}

/* CARD */

.profile-card{
    background:linear-gradient(145deg,#0f172a,#020617);
    padding:35px;
    border-radius:25px;
    box-shadow:0 0 20px rgba(0,195,255,0.1);
}

/* PROFILE INFO */

.profile-info{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
}

.profile-name{
    font-size:28px;
    font-weight:bold;
}

.profile-sub{
    color:#9ca3af;
    margin-top:5px;
    font-size:18px;
}

/* FORM GRID */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

/* INPUT GROUP */

.input-group{
    display:flex;
    flex-direction:column;
}

.full-width{
    grid-column:span 2;
}

/* LABEL */

label{
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:15px;
}

/* INPUTS */

input,
select,
textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
    font-size:15px;
    outline:none;
}

textarea{
    height:120px;
    resize:none;
}

/* BUTTON */

.btn-area{
    text-align:right;
    margin-top:25px;
}

.btn{
    background:linear-gradient(45deg,#3b82f6,#9333ea);
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* RESPONSIVE */

@media(max-width:900px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:span 1;
    }

    .top-bar{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

}

</style>


<!-- TOP BAR -->

<div class="top-bar">

    <div>

        <h1 class="welcome-text">
            Welcome, {{ profile.name }}
        </h1>

        <p class="date-text" id="liveDate"></p>

    </div>

    <div class="top-right">


        {% if profile.image %}
            <img src="{{ profile.image.url }}"
                 class="profile-img">
        {% else %}
            <img src="{% static 'core/default.png' %}"
                 class="profile-img">
        {% endif %}

    </div>

</div>


<!-- PROFILE CARD -->

<div class="profile-card">

    <!-- HEADER -->

    <div class="profile-info">

        {% if profile.image %}
            <img src="{{ profile.image.url }}"
                 class="profile-img large">
        {% else %}
            <img src="{% static 'core/default.png' %}"
                 class="profile-img large">
        {% endif %}

        <div>

            <div class="profile-name">
                {{ profile.name }}
            </div>

            <div class="profile-sub">
                <b>Email:</b> {{ profile.email }}
            </div>

            <div class="profile-sub">
                <b>Gender:</b> {{ profile.gender }}
            </div>

        </div>

    </div>


    <!-- FORM -->

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-grid">

            <!-- NAME -->

            <div class="input-group">

                <label>Name</label>

                <input type="text"
                       name="name"
                       value="{{ profile.name }}">

            </div>


            <!-- EMAIL -->

            <div class="input-group">

                <label>Email ID</label>

                <input type="email"
                       name="email"
                       value="{{ profile.email }}">

            </div>


            <!-- GENDER -->

            <div class="input-group">

                <label>Gender</label>

                <select name="gender">

                    <option value="Male"
                    {% if profile.gender == "Male" %}
                    selected
                    {% endif %}
                    >
                    Male
                    </option>

                    <option value="Female"
                    {% if profile.gender == "Female" %}
                    selected
                    {% endif %}
                    >
                    Female
                    </option>

                    <option value="Other"
                    {% if profile.gender == "Other" %}
                    selected
                    {% endif %}
                    >
                    Other
                    </option>

                </select>

            </div>


            <!-- IMAGE -->

            <div class="input-group">

                <label>Profile Image</label>

                <input type="file" name="image">

            </div>


            <!-- COUNTRY CODE -->

            <div class="input-group">

                <label>Phone Number</label>

                <select name="country_code">

                    <option>+91 India</option>
                    <option>+1 USA</option>
                    <option>+44 UK</option>
                    <option>+61 Australia</option>

                </select>

            </div>


            <!-- MOBILE -->

            <div class="input-group">

                <label>Mobile Number</label>

                <input type="text"
                       name="mobile"
                       value="{{ profile.mobile|default:'' }}">

            </div>


            <!-- COUNTRY -->

            <div class="input-group">

                <label>Country</label>

                <select name="country">

                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                    <option>Canada</option>

                </select>

            </div>


            <!-- STATE -->

            <div class="input-group">

                <label>State</label>

                <select name="state">

                    <option>West Bengal</option>
                    <option>Maharashtra</option>
                    <option>Delhi</option>

                </select>

            </div>


            <!-- CITY -->

            <div class="input-group">

                <label>City</label>

                <select name="city">

                    <option>Krishnanagar</option>
                    <option>Kolkata</option>
                    <option>Delhi</option>

                </select>

            </div>


            <!-- AREA -->

            <div class="input-group">

                <label>Area</label>

                <input type="text"
                       name="area"
                       value="{{ profile.area|default:'' }}">

            </div>


            <!-- PINCODE -->

            <div class="input-group">

                <label>Pincode</label>

                <input type="text"
                       name="pincode"
                       value="{{ profile.pincode|default:'' }}">

            </div>


            <!-- BIO -->

            <div class="input-group full-width">

                <label>Bio</label>

                <textarea name="bio">{{ profile.bio }}</textarea>

            </div>

        </div>


        <!-- BUTTON -->

        <div class="btn-area">

            <button class="btn">
                Save Changes
            </button>

        </div>

    </form>

</div>


<!-- LIVE DATE -->

<script>

const now = new Date();

const options = {
    weekday:'short',
    day:'numeric',
    month:'long',
    year:'numeric'
};

document.getElementById("liveDate").innerHTML =
now.toLocaleDateString('en-US', options);

</script>

{% endblock %}
